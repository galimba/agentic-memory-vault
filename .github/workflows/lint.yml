name: Lint

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint-markdown:
    name: Lint Markdown
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: DavidAnson/markdownlint-cli2-action@05f32210e84442804257b2a6f20b273450ec8265  # v19
        with:
          globs: "**/*.md"
          config: ".markdownlint.yaml"

  lint-shell:
    name: Lint Shell
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: ShellCheck
        run: find .vault -name '*.sh' -exec shellcheck {} +

  lint-yaml:
    name: Lint YAML
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: yamllint
        run: |
          yamllint -d '{extends: default, rules: {line-length: {max: 200}, document-start: disable, truthy: disable}}' .github/

  check-typos:
    name: Check Typos
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: crate-ci/typos@02ea592e44b3a53c302f697cddca7641cd051c3d  # v1
        with:
          config: "_typos.toml"

  vault-doctor:
    name: Vault Doctor
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Run vault doctor
        run: bash .vault/scripts/vault-tools.sh doctor

  tests:
    name: Script Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Configure git identity
        run: |
          git config --global user.email "ci@example.invalid"
          git config --global user.name "CI"
      - name: Run script tests
        run: |
          for test in .vault/scripts/tests/test-*.sh; do
            echo "=== ${test}"
            bash "$test"
          done

  skill-audit:
    name: Skill Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: hashFiles('.vault/schemas/skill-policy.json') != ''
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Run skill audit
        run: bash .vault/scripts/vault-tools.sh skill-audit
