name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-markdown:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: "**/*.md"
          config: ".markdownlint.yaml"

  lint-shell:
    name: Lint Shell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck
        run: find .vault -name '*.sh' -exec shellcheck {} +

  lint-yaml:
    name: Lint YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: yamllint
        run: |
          yamllint -d '{extends: default, rules: {line-length: {max: 200}, document-start: disable, truthy: disable}}' .github/

  check-typos:
    name: Check Typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crate-ci/typos@v1
        with:
          config: "_typos.toml"

  vault-doctor:
    name: Vault Doctor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run vault doctor
        run: bash .vault/scripts/vault-tools.sh doctor
