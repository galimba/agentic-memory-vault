name: Bug Report
description: Report a bug in the vault boilerplate
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: What behavior did you expect instead?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Clone the boilerplate
        2. Run '...'
        3. See error
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: OS
      options:
        - macOS
        - Linux
        - Windows/WSL
    validations:
      required: true

  - type: input
    id: shell
    attributes:
      label: Shell version
      description: e.g., bash 5.2
      placeholder: bash 5.2
    validations:
      required: false

  - type: dropdown
    id: agent_platform
    attributes:
      label: Agent platform
      options:
        - Claude Code
        - Codex
        - Copilot
        - Cursor
        - Other
        - N/A
    validations:
      required: false

  - type: textarea
    id: doctor_output
    attributes:
      label: Output of `vault-tools.sh doctor`
      description: Paste the full output here.
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Anything else?
      description: Any additional context, logs, or screenshots.
    validations:
      required: false
