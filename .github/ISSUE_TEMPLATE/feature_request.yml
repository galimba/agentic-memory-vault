name: Feature Request
description: Suggest an improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: A clear description of the problem or limitation you are facing.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What solution do you propose?
      description: Describe the solution you would like.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or features you have considered.
    validations:
      required: false

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Rules
        - Tags
        - Scripts
        - Templates
        - Documentation
        - Architecture
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context, mockups, or references.
    validations:
      required: false
